// ============================================================
// DICE ENGINE
// ============================================================
function rollDie(sides) { return 1 + Math.floor(Math.random() * sides); }
function rollDice(count, sides) {
  const rolls = []; for (let i = 0; i < count; i++) rolls.push(rollDie(sides));
  return { rolls, total: rolls.reduce((a,b)=>a+b,0) };
}
function rollD20(modifier = 0, advantage = 0) {
  let roll;
  if (advantage > 0) { const a = rollDie(20), b = rollDie(20); roll = Math.max(a,b); }
  else if (advantage < 0) { const a = rollDie(20), b = rollDie(20); roll = Math.min(a,b); }
  else { roll = rollDie(20); }
  return { roll, total: roll + modifier, crit: roll === 20, fumble: roll === 1, modifier };
}
function abilityMod(score) { return Math.floor((score - 10) / 2); }
function fmtMod(n) { return n >= 0 ? `+${n}` : `${n}`; }

let _fbApp = null, _fbDb = null, _fbAuthReady = null, _fbInitError = null;

function fbInit() {
  if (_fbAuthReady) return _fbAuthReady;
  _fbAuthReady = new Promise((resolve) => {
    try {
      _fbApp = firebase.initializeApp(firebaseConfig);
      _fbDb = firebase.database();
      firebase.auth().onAuthStateChanged((user) => {
        if (user) { resolve(true); }
      });
      firebase.auth().signInAnonymously().catch((e) => {
        _fbInitError = e.message;
        console.error('[Ironvale] anonymous sign-in failed:', e);
        resolve(false);
      });
    } catch (e) {
      _fbInitError = e.message;
      console.error('[Ironvale] Firebase init failed:', e);
      resolve(false);
    }
  });
  return _fbAuthReady;
}

// All Ironvale keys live under store/game_rooms/<encoded key> so they
// share the database with the rest of the Hooligans site without
// colliding with any existing paths or rules.
function fbPath(key) {
  return 'store/game_rooms/' + encodeURIComponent(String(key)).replace(/\./g, '%2E');
}

async function storageGet(key) {
  const ok = await fbInit();
  if (!ok) return null;
  try {
    const snap = await _fbDb.ref(fbPath(key)).get();
    return snap.exists() ? snap.val() : null;
  } catch (e) { console.error('[Ironvale] storageGet failed', key, e); return null; }
}
async function storageSet(key, value) {
  const ok = await fbInit();
  if (!ok) return null;
  try {
    await _fbDb.ref(fbPath(key)).set(value);
    return { key, value };
  } catch (e) { console.error('[Ironvale] storageSet failed', key, e); return null; }
}
async function storageList(prefix) {
  const ok = await fbInit();
  if (!ok) return [];
  try {
    const snap = await _fbDb.ref('store/game_rooms').get();
    if (!snap.exists()) return [];
    const all = Object.keys(snap.val()).map(k => decodeURIComponent(k));
    return prefix ? all.filter(k => k.startsWith(prefix)) : all;
  } catch (e) { console.error('[Ironvale] storageList failed', e); return []; }
}
// Live subscription: calls back with the parsed value every time it changes,
// firing once immediately with the current value. Returns an unsubscribe fn.
function storageOnChange(key, callback) {
  let unsub = () => {};
  fbInit().then((ok) => {
    if (!ok) { callback(null); return; }
    const ref = _fbDb.ref(fbPath(key));
    const handler = ref.on('value', (snap) => callback(snap.exists() ? snap.val() : null));
    unsub = () => ref.off('value', handler);
  });
  return () => unsub();
}

// ============================================================
// PIXEL SPRITE ENGINE
// Sprites are defined as grids of palette-index strings.
// '.' = transparent. Rendered via box-shadow pixel technique for crispness.
// ============================================================
function PixelSprite({ grid, palette, scale = 4, style = {} }) {
  const rows = grid.length, cols = grid[0].length;
  const shadows = [];
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const c = grid[y][x];
      if (c === '.' || c === undefined) continue;
      const color = palette[c] || '#ff00ff';
      shadows.push(`${x * scale}px ${y * scale}px 0 0 ${color}`);
    }
  }
  return (
    <div style={{
      width: scale, height: scale, position: 'relative',
      boxShadow: shadows.join(','),
      transform: `translate(0,0)`,
      imageRendering: 'pixelated',
      ...style,
    }} />
  );
}

function SpriteBox({ children, w, h, scale, style = {} }) {
  return (
    <div style={{ width: w * scale, height: h * scale, position: 'relative', flexShrink: 0, ...style }}>
      {children}
    </div>
  );
}

function generateRoomCode() {
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += letters[Math.floor(Math.random() * letters.length)];
  return code;
}

// Subscribes live to a key via Firebase's on('value') listener, returns
// latest value + a setter that writes through immediately. Updates from
// other players arrive the moment Firebase pushes them, no polling delay.
function useSharedState(key, initialValue) {
  const [value, setValue] = useState(initialValue);
  const valueRef = useRef(initialValue);
  const mountedRef = useRef(true);

  useEffect(() => { mountedRef.current = true; return () => { mountedRef.current = false; }; }, []);

  const refresh = useCallback(async () => {
    if (!key) return;
    const remote = await storageGet(key);
    if (remote !== null && mountedRef.current) {
      valueRef.current = remote;
      setValue(remote);
    }
  }, [key]);

  useEffect(() => {
    if (!key) return;
    const unsubscribe = storageOnChange(key, (remote) => {
      if (remote === null || !mountedRef.current) return;
      if (JSON.stringify(remote) !== JSON.stringify(valueRef.current)) {
        valueRef.current = remote;
        setValue(remote);
      }
    });
    return () => unsubscribe();
  }, [key]);

  const writeValue = useCallback(async (newVal) => {
    valueRef.current = newVal;
    setValue(newVal);
    await storageSet(key, newVal);
  }, [key]);

  return [value, writeValue, refresh];
}

function resolveAttack(attackerName, attackerMod, targetAC, dmgDice, dmgBonus = 0, advantage = 0) {
  const atkRoll = rollD20(attackerMod, advantage);
  if (atkRoll.fumble) return { hit: false, fumble: true, roll: atkRoll, damage: 0 };
  const hit = atkRoll.crit || atkRoll.total >= targetAC;
  if (!hit) return { hit: false, fumble: false, roll: atkRoll, damage: 0 };
  const dmgRoll = rollDice(dmgDice[0], dmgDice[1]);
  let damage = dmgRoll.total + dmgBonus;
  if (atkRoll.crit) damage = damage * 2;
  return { hit: true, crit: atkRoll.crit, fumble: false, roll: atkRoll, dmgRoll, damage: Math.max(1, damage) };
}

function xpForNextLevel(level) { return 100 * level + (level - 1) * 50; }

function applyXpGain(character, xpGained) {
  let c = { ...character };
  c.xp += xpGained;
  let leveledUp = false;
  while (c.xp >= c.xpToNext) {
    c.xp -= c.xpToNext;
    c.level += 1;
    c.xpToNext = xpForNextLevel(c.level);
    const conMod = abilityMod(c.stats.con);
    const cls = CLASSES[c.classKey];
    const hpGain = Math.max(1, rollDie(cls.hitDie)) + conMod;
    c.maxHp += hpGain; c.hp = c.maxHp;
    c.maxMp += 4; c.mp = c.maxMp;
    leveledUp = true;
  }
  return { character: c, leveledUp };
}

function statModForAbility(character, statKey) {
  return abilityMod(character.stats[statKey] || 10);
}

// Simple monster AI: pick a random alive party member, attack
function chooseMonsterTarget(party) {
  const aliveMembers = party.filter(p => p.alive && p.hp > 0);
  if (aliveMembers.length === 0) return null;
  return aliveMembers[Math.floor(Math.random() * aliveMembers.length)];
}

function getBossPhase(boss) {
  if (!boss.phases) return null;
  const hpPct = (boss.hp / boss.maxHp) * 100;
  for (const phase of boss.phases) {
    if (hpPct > phase.hpAbove) return phase;
  }
  return boss.phases[boss.phases.length - 1];
}

// Loot table roll
function rollLoot(enemy) {
  const gold = enemy.gold ? (enemy.gold[0] + Math.floor(Math.random() * (enemy.gold[1] - enemy.gold[0] + 1))) : 0;
  const dropTables = {
    common: ['Healing Potion', 'Leather Scrap', 'Rusty Coin', 'Torn Cloth'],
    boss: ['Greater Healing Potion', 'Enchanted Gem', 'Ancient Coin', 'Mysterious Sigil'],
  };
  const table = enemy.isBoss ? dropTables.boss : dropTables.common;
  const dropChance = enemy.isBoss ? 1 : 0.35;
  const item = Math.random() < dropChance ? table[Math.floor(Math.random() * table.length)] : null;
  return { gold, item };
}

// ============================================================
// AUDIO ENGINE - procedural SFX via Web Audio API
// ============================================================
let _actx = null;
function getActx() {
  if (!_actx) {
    try { _actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { return null; }
  }
  return _actx;
}
function playTone(freq, duration, type = 'square', vol = 0.15, slideTo = null) {
  const ctx = getActx(); if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, ctx.currentTime + duration);
  gain.gain.setValueAtTime(vol, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + duration);
}
function playNoise(duration, vol = 0.12) {
  const ctx = getActx(); if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  const bufferSize = ctx.sampleRate * duration;
  const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
  const noise = ctx.createBufferSource(); noise.buffer = buffer;
  const gain = ctx.createGain(); gain.gain.setValueAtTime(vol, ctx.currentTime);
  noise.connect(gain); gain.connect(ctx.destination); noise.start();
}

// ============================================================
// COMBAT ENGINE - shared state combat
// Combat state shape:
// {
//   active: bool, isBoss, bossKey, enemies: [enemyInstance],
//   turnOrder: [{type:'char'|'enemy', id}], turnIndex, roundNum,
//   combatLog: [string], pendingResult: null|{...}, victory: null|'party'|'enemies',
//   acted: { [charId]: true } for current round tracking
// }
// ============================================================
function buildInitiative(party, enemies) {
  const entries = [];
  party.filter(p => p.alive && p.hp > 0).forEach(p => {
    const roll = rollD20(abilityMod(p.stats.dex));
    entries.push({ type: 'char', id: p.id, init: roll.total });
  });
  enemies.forEach(e => {
    const roll = rollD20(0);
    entries.push({ type: 'enemy', id: e.uid, init: roll.total });
  });
  entries.sort((a, b) => b.init - a.init);
  return entries;
}

function startCombat(party, dungeonKey, encounterIdx, isBossFight) {
  const dungeon = DUNGEONS[dungeonKey];
  let enemies;
  if (isBossFight) {
    enemies = [makeEnemyInstance(dungeon.boss, 0, true)];
  } else {
    const numEnemies = 2 + Math.floor(Math.random() * 2);
    enemies = [];
    for (let i = 0; i < numEnemies; i++) {
      const key = dungeon.encounterPool[Math.floor(Math.random() * dungeon.encounterPool.length)];
      enemies.push(makeEnemyInstance(key, i, false));
    }
  }
  const turnOrder = buildInitiative(party, enemies);
  return {
    active: true, isBoss: isBossFight, bossKey: isBossFight ? dungeon.boss : null,
    enemies, turnOrder, turnIndex: 0, roundNum: 1,
    combatLog: [isBossFight ? `${enemies[0].name} appears! ${BOSSES[dungeon.boss].desc}` : 'Enemies attack!'],
    victory: null, version: 0, lastActionAt: Date.now(),
  };
}

function CombatScreen({ combat, setCombat, party, setParty, myChar, onUpdateMyChar, onCombatEnd, addLog }) {
  const [selectedAbility, setSelectedAbility] = useState(null);
  const [selectedTarget, setSelectedTarget] = useState(null);
  const [floaters, setFloaters] = useState([]);
  const [processing, setProcessing] = useState(false);
  const myTurnProcessedRef = useRef(false);

  const currentTurnEntry = combat.turnOrder[combat.turnIndex];
  const isMyTurn = currentTurnEntry && currentTurnEntry.type === 'char' && currentTurnEntry.id === myChar.id;
  const currentActor = currentTurnEntry && currentTurnEntry.type === 'char'
    ? party.find(p => p.id === currentTurnEntry.id)
    : combat.enemies.find(e => e.uid === currentTurnEntry?.id);

  const addFloater = (text, color, idx) => {
    const id = Math.random();
    setFloaters(f => [...f, { id, text, color, x: 40 + idx * 90, y: 60 }]);
  };
  const removeFloater = (id) => setFloaters(f => f.filter(x => x.id !== id));

  const aliveEnemies = combat.enemies.filter(e => e.hp > 0);
  const aliveParty = party.filter(p => p.alive && p.hp > 0);

  // Advance turn index, skip dead actors, handle round increment
  function nextTurnOrder(order, idx, roundNum) {
    let nextIdx = idx + 1;
    let round = roundNum;
    if (nextIdx >= order.length) { nextIdx = 0; round += 1; }
    return { nextIdx, round };
  }

  function findAliveEntry(order, startIdx, partySnapshot, enemySnapshot) {
    let idx = startIdx;
    for (let tries = 0; tries < order.length; tries++) {
      const entry = order[idx % order.length];
      if (entry.type === 'char') {
        const c = partySnapshot.find(p => p.id === entry.id);
        if (c && c.alive && c.hp > 0) return idx % order.length;
      } else {
        const e = enemySnapshot.find(en => en.uid === entry.id);
        if (e && e.hp > 0) return idx % order.length;
      }
      idx++;
    }
    return -1;
  }

  // Process enemy turn (runs only on host-equivalent: whoever's client gets there first via shared state CAS-ish approach)
  useEffect(() => {
    if (!combat.active || combat.victory) return;
    if (!currentTurnEntry) return;
    if (currentTurnEntry.type !== 'enemy') return;
    if (processing) return;

    const enemy = combat.enemies.find(e => e.uid === currentTurnEntry.id);
    if (!enemy || enemy.hp <= 0) return;

    // small random delay so simultaneous clients don't all fire identical action; last write wins is fine for this scale
    const delay = 600 + Math.random() * 500;
    const timer = setTimeout(async () => {
      setProcessing(true);
      const target = chooseMonsterTarget(party);
      if (!target) { setProcessing(false); return; }
      let dmgDice = enemy.dmg;
      let attackerMod = 2 + (enemy.isBoss ? 3 : 0);
      const phase = enemy.isBoss ? getBossPhase(enemy) : null;
      const result = resolveAttack(enemy.name, attackerMod, target.ac, dmgDice, 0);

      let newLog = [...combat.combatLog];
      let updatedParty = party.map(p => ({ ...p }));
      const targetIdx = updatedParty.findIndex(p => p.id === target.id);

      if (result.hit) {
        SFX.hit();
        updatedParty[targetIdx].hp = Math.max(0, updatedParty[targetIdx].hp - result.damage);
        newLog.push(`${enemy.name} hits ${target.name} for ${result.damage} damage.${result.crit ? ' Critical hit!' : ''}`);
        if (updatedParty[targetIdx].hp <= 0) {
          updatedParty[targetIdx].alive = false;
          newLog.push(`${target.name} has fallen!`);
          SFX.death();
        }
      } else {
        SFX.miss();
        newLog.push(`${enemy.name} attacks ${target.name} but misses.`);
      }

      const stillAliveParty = updatedParty.filter(p => p.alive && p.hp > 0);
      let victory = null;
      if (stillAliveParty.length === 0) victory = 'enemies';

      const { nextIdx, round } = nextTurnOrder(combat.turnOrder, combat.turnIndex, combat.roundNum);
      const safeIdx = victory ? combat.turnIndex : findAliveEntry(combat.turnOrder, nextIdx, updatedParty, combat.enemies);

      setParty(updatedParty);
      setCombat({
        ...combat, combatLog: newLog.slice(-30), turnIndex: safeIdx === -1 ? 0 : safeIdx,
        roundNum: round, victory, lastActionAt: Date.now(), version: combat.version + 1,
      });
      setProcessing(false);
    }, delay);
    return () => clearTimeout(timer);
  }, [combat.turnIndex, combat.active, combat.victory]);

  async function performAbility(ability, target) {
    if (processing) return;
    setProcessing(true);
    SFX.diceRoll();
    const myMod = statModForAbility(myChar, ability.statKey || 'str');
    let newLog = [...combat.combatLog];
    let updatedEnemies = combat.enemies.map(e => ({ ...e }));
    let updatedParty = party.map(p => ({ ...p }));
    const myIdx = updatedParty.findIndex(p => p.id === myChar.id);

    // pay cost
    if (ability.cost) {
      if (myChar.mp < ability.cost) { setProcessing(false); return; }
      updatedParty[myIdx].mp -= ability.cost;
    }

    if (ability.type === 'attack' || ability.type === 'multi') {
      const hits = ability.hits || 1;
      let totalDmg = 0;
      for (let h = 0; h < hits; h++) {
        const result = resolveAttack(myChar.name, myMod, target.ac, ability.dmg, 0);
        if (result.hit) {
          let dmg = result.damage;
          if (ability.bonusVsFull && target.hp === target.maxHp) {
            const bonus = rollDice(ability.bonusVsFull[0], ability.bonusVsFull[1]);
            dmg += bonus.total;
          }
          totalDmg += dmg;
          SFX.hit();
        } else {
          SFX.miss();
        }
        if (result.crit) SFX.critHit();
      }
      const targetIdx = updatedEnemies.findIndex(e => e.uid === target.uid);
      updatedEnemies[targetIdx].hp = Math.max(0, updatedEnemies[targetIdx].hp - totalDmg);
      newLog.push(`${myChar.name} uses ${ability.name} on ${target.name} for ${totalDmg} damage.`);
      addFloater(`-${totalDmg}`, PAL.danger, 0);
      if (updatedEnemies[targetIdx].hp <= 0) newLog.push(`${target.name} is defeated!`);
    } else if (ability.type === 'aoe') {
      let totalAll = 0;
      updatedEnemies.forEach((e, i) => {
        if (e.hp <= 0) return;
        const result = resolveAttack(myChar.name, myMod, e.ac, ability.dmg, 0);
        if (result.hit) { updatedEnemies[i].hp = Math.max(0, e.hp - result.damage); totalAll += result.damage; }
      });
      newLog.push(`${myChar.name} uses ${ability.name}, striking all enemies for ${totalAll} total damage.`);
      SFX.spell();
    } else if (ability.type === 'heal') {
      const healRoll = rollDice(ability.heal[0], ability.heal[1]);
      const healAmt = healRoll.total + (ability.bonus || 0);
      updatedParty[myIdx].hp = Math.min(updatedParty[myIdx].maxHp, updatedParty[myIdx].hp + healAmt);
      newLog.push(`${myChar.name} uses ${ability.name}, recovering ${healAmt} HP.`);
      addFloater(`+${healAmt}`, PAL.success, 0);
      SFX.heal();
    } else if (ability.type === 'partyheal') {
      const healRoll = rollDice(ability.heal[0], ability.heal[1]);
      const healAmt = healRoll.total + (ability.bonus || 0);
      updatedParty.forEach((p, i) => { if (p.alive) updatedParty[i].hp = Math.min(p.maxHp, p.hp + healAmt); });
      newLog.push(`${myChar.name} uses ${ability.name}, healing the whole party for ${healAmt} HP each.`);
      SFX.heal();
    } else if (ability.type === 'buff' || ability.type === 'debuff') {
      newLog.push(`${myChar.name} uses ${ability.name}.`);
      SFX.spell();
    }

    updatedParty[myIdx].cooldowns = { ...updatedParty[myIdx].cooldowns, [ability.id]: ability.cooldown };

    const stillAliveEnemies = updatedEnemies.filter(e => e.hp > 0);
    let victory = null;
    if (stillAliveEnemies.length === 0) victory = 'party';

    const { nextIdx, round } = nextTurnOrder(combat.turnOrder, combat.turnIndex, combat.roundNum);
    const safeIdx = victory ? combat.turnIndex : findAliveEntry(combat.turnOrder, nextIdx, updatedParty, updatedEnemies);

    setParty(updatedParty);
    setCombat({
      ...combat, enemies: updatedEnemies, combatLog: newLog.slice(-30),
      turnIndex: safeIdx === -1 ? 0 : safeIdx, roundNum: round, victory,
      lastActionAt: Date.now(), version: combat.version + 1,
    });
    setSelectedAbility(null); setSelectedTarget(null);
    setTimeout(() => setProcessing(false), 300);
  }

  // tick down cooldowns at start of my turn
  useEffect(() => {
    if (isMyTurn && !myTurnProcessedRef.current) {
      myTurnProcessedRef.current = true;
      SFX.turnStart();
      if (Object.values(myChar.cooldowns || {}).some(v => v > 0)) {
        const newCd = {};
        Object.entries(myChar.cooldowns).forEach(([k, v]) => { newCd[k] = Math.max(0, v - 1); });
        onUpdateMyChar({ ...myChar, cooldowns: newCd });
      }
    }
    if (!isMyTurn) myTurnProcessedRef.current = false;
  }, [isMyTurn]);

  useEffect(() => {
    if (combat.victory) {
      const t = setTimeout(() => onCombatEnd(combat.victory), 2600);
      return () => clearTimeout(t);
    }
  }, [combat.victory]);

  const cls = CLASSES[myChar.classKey];

  return (
    <div style={{ minHeight: '100vh', background: `linear-gradient(180deg, #1c1420 0%, #100c14 60%)`, position: 'relative', overflow: 'hidden' }}>
      <style>{GLOBAL_STYLE}</style>
      <PartyStatusBar party={party} myCharId={myChar.id} />

      <div style={{ textAlign: 'center', padding: '8px 0', fontFamily: fontPixel, fontSize: 12, color: PAL.inkDim }}>
        ROUND {combat.roundNum} {combat.isBoss && <span style={{ color: PAL.danger }}>· BOSS ENCOUNTER</span>}
      </div>

      <div style={{ position: 'relative', display: 'flex', justifyContent: 'center', gap: 24, padding: '20px 16px', flexWrap: 'wrap' }}>
        {floaters.map(f => <FloatingText key={f.id} {...f} onDone={() => removeFloater(f.id)} />)}
        {combat.enemies.map((e, i) => {
          const isTargetable = selectedAbility && e.hp > 0;
          const isSelected = selectedTarget && selectedTarget.uid === e.uid;
          const isCurrentTurn = currentTurnEntry && currentTurnEntry.type === 'enemy' && currentTurnEntry.id === e.uid;
          return (
            <div key={e.uid} onClick={() => isTargetable && setSelectedTarget(e)}
              style={{
                textAlign: 'center', opacity: e.hp <= 0 ? 0.25 : 1, cursor: isTargetable ? 'pointer' : 'default',
                filter: isCurrentTurn ? 'drop-shadow(0 0 8px rgba(232,196,104,0.7))' : 'none',
                transform: isSelected ? 'scale(1.08)' : 'scale(1)', transition: 'all 0.15s',
              }}>
              <div style={{ border: isSelected ? `2px solid ${PAL.gold}` : '2px solid transparent', borderRadius: 4, padding: 6 }}>
                <MonsterSprite monsterKey={e.icon} scale={e.isBoss ? 7 : 5} />
              </div>
              <div style={{ fontFamily: fontPixel, fontSize: e.isBoss ? 13 : 11, color: e.isBoss ? PAL.danger : PAL.ink, marginTop: 4 }}>{e.name}</div>
              <div style={{ width: e.isBoss ? 140 : 90, margin: '4px auto' }}>
                <StatBar value={e.hp} max={e.maxHp} color={e.isBoss ? PAL.danger : PAL.hp} colorDark={PAL.hpDark} height={8} />
              </div>
            </div>
          );
        })}
      </div>

      <div style={{ display: 'flex', justifyContent: 'center', gap: 16, padding: '10px 16px', flexWrap: 'wrap', marginBottom: 8 }}>
        {party.map(p => {
          const isCurrentTurn = currentTurnEntry && currentTurnEntry.type === 'char' && currentTurnEntry.id === p.id;
          const dead = !p.alive || p.hp <= 0;
          const pCls = CLASSES[p.classKey];
          return (
            <div key={p.id} style={{ textAlign: 'center', opacity: dead ? 0.35 : 1, filter: isCurrentTurn ? `drop-shadow(0 0 8px ${pCls.color}aa)` : 'none' }}>
              <CharSprite classKey={p.classKey} scale={4} flip />
              <div style={{ fontFamily: fontPixel, fontSize: 10, color: pCls.color }}>{p.name}{dead ? ' (down)' : ''}</div>
              <div style={{ width: 70, margin: '2px auto' }}><StatBar value={p.hp} max={p.maxHp} color={PAL.hp} colorDark={PAL.hpDark} height={6} /></div>
            </div>
          );
        })}
      </div>

      <Panel style={{ margin: '0 16px 16px', maxHeight: 130, overflowY: 'auto' }}>
        {combat.combatLog.slice(-6).reverse().map((l, i) => (
          <div key={i} style={{ fontFamily: fontBody, fontSize: 12, color: i === 0 ? PAL.ink : PAL.inkDim, marginBottom: 3 }}>{l}</div>
        ))}
      </Panel>

      {combat.victory ? (
        <div style={{ textAlign: 'center', padding: 20 }}>
          <div style={{ fontFamily: fontPixel, fontSize: 22, color: combat.victory === 'party' ? PAL.success : PAL.danger }}>
            {combat.victory === 'party' ? 'VICTORY!' : 'YOUR PARTY HAS FALLEN'}
          </div>
        </div>
      ) : (
        <div style={{ margin: '0 16px 24px', background: PAL.panel, border: `2px solid ${PAL.border}`, borderRadius: 4, padding: 14 }}>
          {!isMyTurn ? (
            <div style={{ textAlign: 'center', fontFamily: fontPixel, fontSize: 13, color: PAL.inkDim }} className="pulse">
              {currentActor ? `Waiting for ${currentActor.name}'s turn...` : 'Waiting...'}
            </div>
          ) : (
            <div>
              <div style={{ fontFamily: fontPixel, fontSize: 12, color: PAL.gold, marginBottom: 10, textAlign: 'center' }}>YOUR TURN</div>
              <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'center', marginBottom: selectedAbility ? 12 : 0 }}>
                {cls.abilities.map(ab => {
                  const onCd = (myChar.cooldowns?.[ab.id] || 0) > 0;
                  const noMana = ab.cost && myChar.mp < ab.cost;
                  return (
                    <PixelButton key={ab.id} small color={cls.color} disabled={onCd || noMana || processing}
                      onClick={() => { setSelectedAbility(ab); setSelectedTarget(null); }}
                      style={{ opacity: selectedAbility?.id === ab.id ? 1 : 0.85, border: selectedAbility?.id === ab.id ? `2px solid ${PAL.gold}` : undefined }}>
                      {ab.name}{ab.cost ? ` (${ab.cost}mp)` : ''}{onCd ? ` [${myChar.cooldowns[ab.id]}]` : ''}
                    </PixelButton>
                  );
                })}
              </div>
              {selectedAbility && (
                <div style={{ textAlign: 'center' }}>
                  <div style={{ fontFamily: fontBody, fontSize: 12, color: PAL.inkDim, marginBottom: 8 }}>{selectedAbility.desc}</div>
                  {(selectedAbility.type === 'attack' || selectedAbility.type === 'multi') && !selectedTarget && (
                    <div style={{ fontFamily: fontPixel, fontSize: 11, color: PAL.gold }}>Choose a target above</div>
                  )}
                  {(selectedAbility.type === 'aoe' || selectedAbility.type === 'heal' || selectedAbility.type === 'partyheal' || selectedAbility.type === 'buff' || selectedAbility.type === 'debuff') && (
                    <PixelButton color={PAL.success} disabled={processing} onClick={() => performAbility(selectedAbility, aliveEnemies[0])}>Confirm</PixelButton>
                  )}
                  {(selectedAbility.type === 'attack' || selectedAbility.type === 'multi') && selectedTarget && (
                    <PixelButton color={PAL.success} disabled={processing} onClick={() => performAbility(selectedAbility, selectedTarget)}>
                      Strike {selectedTarget.name}
                    </PixelButton>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MAIN APP - orchestrates the full game flow
// ============================================================
function getHashParams() {
  const hash = window.location.hash.replace('#', '');
  const params = {};
  hash.split('&').forEach(pair => {
    const [k, v] = pair.split('=');
    if (k) params[k] = decodeURIComponent(v || '');
  });
  return params;
}
function setHashParams(obj) {
  const str = Object.entries(obj).filter(([k,v]) => v != null).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
  window.location.hash = str;
}

function App() {
  const initialHash = useMemo(() => getHashParams(), []);
  const [screen, setScreen] = useState('title'); // title | charcreate | game
  const [roomCode, setRoomCode] = useState(initialHash.room || null);
  const [playerName, setPlayerName] = useState(initialHash.name || '');
  const [myCharId, setMyCharId] = useState(initialHash.char || null);
  const [isHost, setIsHost] = useState(false);
  const [rewardsLocal, setRewardsLocal] = useState(null);

  // shared room-level state (phase, act, dungeon progress, combat, log)
  const [roomState, setRoomState, refreshRoomState] = useSharedState(
    roomCode ? roomKey(roomCode, 'state') : null,
    null
  );
  // shared party (all characters)
  const [party, setParty, refreshParty] = useSharedState(
    roomCode ? roomKey(roomCode, 'party') : null,
    []
  );

  // Attempt to rejoin from hash on load
  useEffect(() => {
    if (initialHash.room && initialHash.name) {
      (async () => {
        const exists = await storageGet(roomKey(initialHash.room, 'meta'), true);
        if (exists) {
          setRoomCode(initialHash.room);
          setIsHost(exists.hostName === initialHash.name);
          if (initialHash.char) {
            setMyCharId(initialHash.char);
            setScreen('game');
          } else {
            setScreen('game');
          }
        }
      })();
    }
  }, []);

  async function handleCreateRoom(name) {
    const code = generateRoomCode();
    setPlayerName(name);
    setRoomCode(code);
    setIsHost(true);
    const meta = newRoomState(code, name);
    await storageSet(roomKey(code, 'meta'), meta, true);
    await storageSet(roomKey(code, 'state'), { phase: 'lobby', actIndex: 0, dungeonRoomIndex: 0, combat: null, log: [], pendingRewards: null }, true);
    await storageSet(roomKey(code, 'party'), [], true);
    setRoomState({ phase: 'lobby', actIndex: 0, dungeonRoomIndex: 0, combat: null, log: [], pendingRewards: null });
    setParty([]);
    setHashParams({ room: code, name });
    setScreen('charcreate');
  }

  async function handleJoinRoom(name, code) {
    setPlayerName(name); setRoomCode(code); setIsHost(false);
    const meta = await storageGet(roomKey(code, 'meta'), true);
    if (meta) setIsHost(meta.hostName === name);
    const state = await storageGet(roomKey(code, 'state'), true);
    if (state) setRoomState(state);
    const p = await storageGet(roomKey(code, 'party'), true);
    if (p) setParty(p);
    setHashParams({ room: code, name });
    setScreen('charcreate');
  }

  async function handleCharCreate(charName, classKey) {
    const id = `char_${Math.random().toString(36).slice(2,9)}`;
    const newChar = newCharacter(id, charName, classKey, playerName);
    const latestParty = (await storageGet(roomKey(roomCode, 'party'), true)) || [];
    const updated = [...latestParty, newChar];
    await storageSet(roomKey(roomCode, 'party'), updated, true);
    setParty(updated);
    setMyCharId(id);
    setHashParams({ room: roomCode, name: playerName, char: id });
    setScreen('game');
  }

  const myChar = useMemo(() => party.find(c => c.id === myCharId), [party, myCharId]);

  // writes a log entry through to the latest shared state to avoid clobbering concurrent writers
  async function addLogAsync(text) {
    const latest = (await storageGet(roomKey(roomCode, 'state'), true)) || roomState;
    const newLog = [...(latest.log || []), text].slice(-60);
    const updated = { ...latest, log: newLog };
    await setRoomState(updated);
  }

  function updateMyChar(updatedChar) {
    const newParty = party.map(c => c.id === updatedChar.id ? updatedChar : c);
    setParty(newParty);
  }

  async function handleStartAdventure() {
    await setRoomState({ ...roomState, phase: 'town' });
  }

  async function handleEnterDungeon() {
    await setRoomState({ ...roomState, phase: 'dungeon', dungeonRoomIndex: 0 });
  }

  async function handleFightEncounter() {
    const act = STORY.acts[roomState.actIndex];
    const combat = startCombat(party, act.dungeon, roomState.dungeonRoomIndex, false);
    await setRoomState({ ...roomState, phase: 'combat', combat });
  }

  async function handleFightBoss() {
    const act = STORY.acts[roomState.actIndex];
    const combat = startCombat(party, act.dungeon, roomState.dungeonRoomIndex, true);
    await setRoomState({ ...roomState, phase: 'combat', combat, isBossCombat: true });
  }

  async function handleCombatEnd(result) {
    if (result === 'enemies') {
      const revived = party.map(c => ({ ...c, alive: true, hp: Math.floor(c.maxHp * 0.5) }));
      await setParty(revived);
      await setRoomState({ ...roomState, phase: 'town', combat: null });
      return;
    }
    const combat = roomState.combat;
    let totalGold = 0, totalXp = 0, items = [];
    combat.enemies.forEach(e => {
      const loot = rollLoot(e);
      totalGold += loot.gold; totalXp += e.xp;
      if (loot.item) items.push(loot.item);
    });
    let levelUps = [];
    const updatedParty = party.map(c => {
      if (!c.alive || c.hp <= 0) return c;
      const { character, leveledUp } = applyXpGain({ ...c, gold: c.gold + totalGold, inventory: items.length ? [...c.inventory, ...items] : c.inventory }, totalXp);
      if (leveledUp) levelUps.push(character.name);
      return character;
    });
    if (levelUps.length > 0) SFX.levelUp(); else SFX.victory();
    await setParty(updatedParty);
    const rewards = { gold: totalGold, xp: totalXp, items, levelUps };
    const wasBoss = combat.isBoss;
    await setRoomState({ ...roomState, phase: 'rewards', combat: null, pendingRewards: { rewards, wasBoss } });
  }

  async function handleRewardsContinue() {
    const wasBoss = roomState.pendingRewards?.wasBoss;
    if (wasBoss) {
      const isFinal = roomState.actIndex >= STORY.acts.length - 1;
      await setRoomState({ ...roomState, phase: 'actcomplete', pendingRewards: null, isFinalAct: isFinal });
    } else {
      await setRoomState({ ...roomState, phase: 'dungeon', dungeonRoomIndex: roomState.dungeonRoomIndex + 1, pendingRewards: null });
    }
  }

  async function handleActComplete() {
    const isFinal = roomState.actIndex >= STORY.acts.length - 1;
    if (isFinal) {
      await setRoomState({ ...roomState, phase: 'town', actIndex: 0, dungeonRoomIndex: 0 });
    } else {
      await setRoomState({ ...roomState, phase: 'town', actIndex: roomState.actIndex + 1, dungeonRoomIndex: 0 });
    }
  }

  if (screen === 'title') {
    return <TitleScreen onCreateRoom={handleCreateRoom} onJoinRoom={handleJoinRoom} />;
  }

  if (screen === 'charcreate') {
    if (!roomState) return <LoadingScreen />;
    if (myCharId && myChar) {
      return <LoadingScreen />;
    }
    return <CharacterCreation playerName={playerName} onCreate={handleCharCreate} />;
  }

  if (screen === 'game') {
    if (!roomState || !party) return <LoadingScreen />;
    if (!myChar) return <LoadingScreen text="Joining party..." />;

    const phase = roomState.phase;
    const act = STORY.acts[roomState.actIndex] || STORY.acts[0];

    if (phase === 'lobby') {
      return <Lobby roomCode={roomCode} party={party} isHost={isHost} onStart={handleStartAdventure} myCharId={myCharId} />;
    }
    if (phase === 'town') {
      return <TownHub room={roomState} party={party} myChar={myChar} actData={act}
        onUpdateChar={updateMyChar} onEnterDungeon={isHost ? handleEnterDungeon : () => {}}
        log={roomState.log || []} addLog={addLogAsync} />;
    }
    if (phase === 'dungeon') {
      return <DungeonScreen dungeonKey={act.dungeon} roomIndex={roomState.dungeonRoomIndex}
        onFightEncounter={handleFightEncounter} onFightBoss={handleFightBoss} isHost={isHost} party={party} />;
    }
    if (phase === 'combat' && roomState.combat) {
      return <CombatScreen combat={roomState.combat}
        setCombat={async (newCombat) => { await setRoomState({ ...roomState, combat: newCombat }); }}
        party={party} setParty={setParty} myChar={myChar}
        onUpdateMyChar={updateMyChar}
        onCombatEnd={isHost ? handleCombatEnd : () => {}}
        addLog={addLogAsync} />;
    }
    if (phase === 'rewards' && roomState.pendingRewards) {
      return <RewardsScreen rewards={roomState.pendingRewards.rewards} onContinue={handleRewardsContinue} isHost={isHost} />;
    }
    if (phase === 'actcomplete') {
      return <ActCompleteScreen act={act} onContinue={handleActComplete} isHost={isHost} isFinal={roomState.isFinalAct} />;
    }
    return <LoadingScreen />;
  }

  return <LoadingScreen />;
}

function LoadingScreen({ text }) {
  return (
    <div style={{ minHeight: '100vh', background: PAL.bg, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
